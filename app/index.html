<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Apps - Garmin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 5vh 10vw;
      color: #3b3c3d;
      background: #fafafa;
    }

    .back-link {
      font-size: 1em;
      color: #888;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #333;
    }

    h1 {
      font-size: 3em;
      font-weight: 500;
      margin: 20px 0 30px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .app-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .app-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }

    .app-icon {
      font-size: 2.5em;
      line-height: 1;
    }

    .app-name {
      font-size: 1.3em;
      font-weight: 600;
      color: #121314;
    }

    .app-desc {
      font-size: 0.95em;
      color: #777;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <a class="back-link" href="/">&#8592; Home</a>
  <h1>Apps</h1>
  <div class="app-grid">
    <a class="app-card" href="/app/disc-test">
      <div class="app-icon">&#x1F9E0;</div>
      <div class="app-name">DISC Test</div>
      <div class="app-desc">DISC 行为模型测试，40 道题逐题作答，统计 D/I/S/C 分布并给出行为分析。</div>
    </a>
    <a class="app-card" href="/app/sushiro">
      <div class="app-icon">&#x1F363;</div>
      <div class="app-name">Sushiro Counter</div>
      <div class="app-desc">寿司郎点餐计数器，支持多种碟子价格、服务费与折扣计算。</div>
    </a>
  </div>
</body>

</html>
