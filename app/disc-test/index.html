<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISC Test - 行为模型测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --d-color: #c0392b;
            --i-color: #d4a017;
            --s-color: #27ae60;
            --c-color: #2980b9;
            --text: #2c3e50;
            --muted: #95a5a6;
            --border: #dde1e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #fff;
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .back-link {
            font-size: 0.95em;
            color: #999;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #555;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 28px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Start Page */
        .start-page {
            text-align: center;
            justify-content: center;
            align-items: center;
            border: none;
            padding: 40px 24px;
        }

        .start-page h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .start-page .subtitle {
            color: var(--muted);
            font-size: 1rem;
            margin-bottom: 32px;
        }

        .instructions {
            text-align: left;
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 32px;
            max-width: 480px;
        }

        .instructions h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #1a1a2e;
        }

        .instructions p {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .type-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .type-badge {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
        }

        .type-badge.d {
            background: var(--d-color);
        }

        .type-badge.i {
            background: var(--i-color);
        }

        .type-badge.s {
            background: var(--s-color);
        }

        .type-badge.c {
            background: var(--c-color);
        }

        .btn {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #fff;
            color: var(--text);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #2c3e50;
            color: #fff;
            border-color: #2c3e50;
        }

        .btn-primary:hover {
            background: #3d566e;
        }

        .btn-secondary {
            background: #fff;
            color: #555;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Question Page */
        .question-header {
            margin-bottom: 24px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .progress-bar {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2c3e50;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .question-title {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #1a1a2e;
        }

        .question-title span {
            color: var(--muted);
            font-weight: 500;
            margin-right: 6px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .option {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px 14px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: border-color 0.15s, background 0.15s;
            text-align: left;
            font-size: 1rem;
            color: var(--text);
        }

        .option:hover {
            border-color: #aaa;
        }

        .option.selected {
            border-color: #2c3e50;
            background: #fafafa;
        }

        .option-marker {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #d0d5dd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .option.selected .option-marker {
            background: #2c3e50;
            border-color: #2c3e50;
            color: white;
        }

        .option-text {
            padding-top: 1px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            gap: 12px;
        }

        .nav-buttons .btn {
            flex: 1;
        }

        /* Result Page */
        .result-page {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .result-header h2 {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .result-header p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .dominant-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 14px 0;
        }

        .score-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }

        .score-item {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            border-top: 3px solid;
        }

        .score-item.d {
            border-top-color: var(--d-color);
        }

        .score-item.i {
            border-top-color: var(--i-color);
        }

        .score-item.s {
            border-top-color: var(--s-color);
        }

        .score-item.c {
            border-top-color: var(--c-color);
        }

        .score-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .score-name {
            font-size: 0.8rem;
            color: #b0b8c0;
            margin-bottom: 6px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .bar-chart {
            margin-bottom: 28px;
        }

        .bar-item {
            margin-bottom: 12px;
        }

        .bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }

        .bar-track {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.8s ease;
        }

        .bar-fill.d {
            background: var(--d-color);
        }

        .bar-fill.i {
            background: var(--i-color);
        }

        .bar-fill.s {
            background: var(--s-color);
        }

        .bar-fill.c {
            background: var(--c-color);
        }

        .analysis-section {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .analysis-section h3 {
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .analysis-section p {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        .analysis-section ul {
            padding-left: 20px;
            color: var(--text);
            font-size: 0.95rem;
        }

        .analysis-section li {
            margin-bottom: 5px;
        }

        .type-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            margin-right: 4px;
        }

        .type-tag.d {
            background: var(--d-color);
        }

        .type-tag.i {
            background: var(--i-color);
        }

        .type-tag.s {
            background: var(--s-color);
        }

        .type-tag.c {
            background: var(--c-color);
        }

        .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .result-actions .btn {
            flex: 1;
        }

        .loading {
            text-align: center;
            color: var(--muted);
            padding: 60px 0;
            font-size: 0.95rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 10px 32px;
            }

            .card {
                padding: 20px 16px;
                border-radius: 4px;
            }

            .start-page {
                padding: 32px 16px;
            }

            .start-page h1 {
                font-size: 1.6rem;
            }

            .question-title {
                font-size: 1.1rem;
            }

            .option {
                padding: 14px 12px;
            }

            .score-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <a class="back-link" href="/app">&#8592; Apps</a>

        <div v-if="loading" class="card" style="justify-content:center; align-items:center;">
            <div class="loading">加载中...</div>
        </div>

        <template v-else>
            <!-- Start Page -->
            <div v-if="page === 'start'" class="card start-page">
                <h1>DISC 行为模型测试</h1>
                <p class="subtitle">40 道题 · 发现你的行为风格</p>

                <div class="type-badges">
                    <div class="type-badge d">D</div>
                    <div class="type-badge i">I</div>
                    <div class="type-badge s">S</div>
                    <div class="type-badge c">C</div>
                </div>

                <div class="instructions">
                    <h3>测试说明</h3>
                    <p>在每道题的四个选项中，只选择一个最符合你自己的描述。</p>
                    <p>请按第一印象最快地选择，如果不能确定，可回忆童年时的情况，或参考最熟悉的人对你的评价。</p>
                    <p>一共 40 题，不能遗漏。</p>
                </div>

                <button class="btn btn-primary" @click="startTest">
                    开始测试
                </button>
            </div>

            <!-- Question Page -->
            <div v-else-if="page === 'question'" class="card">
                <div class="question-header">
                    <div class="progress-info">
                        <span>第 {{ currentIndex + 1 }} / {{ questions.length }} 题</span>
                        <span>进度 {{ progressPercent }}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" :style="{ width: progressPercent + '%' }"></div>
                    </div>
                </div>

                <h2 class="question-title"><span>第 {{ currentIndex + 1 }} 题</span>请选择最符合你的一项</h2>

                <div class="options">
                    <button v-for="(option, idx) in currentQuestion.options" :key="idx" class="option"
                        :class="{ selected: answers[currentIndex] === idx }" @click="selectOption(idx)">
                        <div class="option-marker">{{ ['A', 'B', 'C', 'D'][idx] }}</div>
                        <div class="option-text">{{ option.text }}</div>
                    </button>
                </div>

                <div class="nav-buttons">
                    <button class="btn btn-secondary" @click="prevQuestion" :disabled="currentIndex === 0">上一题</button>
                    <button class="btn btn-primary" @click="nextQuestion" :disabled="answers[currentIndex] === null">{{
                        isLastQuestion ? '查看结果' : '下一题' }}</button>
                </div>
            </div>

            <!-- Result Page -->
            <div v-else-if="page === 'result'" class="card result-page">
                <div class="result-header">
                    <h2>你的 DISC 测试结果</h2>
                    <p>测试完成，以下是基于你选择的分析</p>
                    <div class="dominant-badge">
                        主导类型：{{ dominantTypesLabel }}
                    </div>
                </div>

                <div class="score-board">
                    <div v-for="item in scoreList" :key="item.type" class="score-item" :class="item.type">
                        <div class="score-label">{{ item.type }}</div>
                        <div class="score-name">{{ item.name }}</div>
                        <div class="score-value">{{ item.count }}</div>
                    </div>
                </div>

                <div class="bar-chart">
                    <div v-for="item in scoreList" :key="item.type" class="bar-item">
                        <div class="bar-header">
                            <span>{{ item.type }} · {{ item.name }}</span>
                            <span>{{ item.count }} 题</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" :class="item.type" :style="{ width: item.percent + '%' }"></div>
                        </div>
                    </div>
                </div>

                <div class="analysis-section">
                    <h3>行为模型分析</h3>
                    <p><strong>你的核心特质：</strong>{{ coreTraits }}</p>
                    <div v-for="t in dominantTypes" :key="t">
                        <p><span class="type-tag" :class="t">{{ t }}</span><strong>{{ typeInfo[t].name }}</strong></p>
                        <p>{{ typeInfo[t].desc }}</p>
                        <ul>
                            <li v-for="(trait, idx) in typeInfo[t].traits" :key="idx">{{ trait }}</li>
                        </ul>
                    </div>
                </div>

                <div class="analysis-section">
                    <h3>发展建议</h3>
                    <ul>
                        <li v-for="(tip, idx) in developmentTips" :key="idx">{{ tip }}</li>
                    </ul>
                </div>

                <div class="result-actions">
                    <button class="btn btn-secondary" @click="restartTest">重新测试</button>
                    <button class="btn btn-primary" @click="shareResult">分享结果</button>
                </div>
            </div>
        </template>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const page = ref('start');
                const currentIndex = ref(0);
                const loading = ref(true);
                const questions = ref([]);
                const typeInfo = ref({});
                const answers = ref([]);

                fetch('data.json')
                    .then(r => r.json())
                    .then(data => {
                        questions.value = data.questions;
                        typeInfo.value = data.typeInfo;
                        answers.value = new Array(data.questions.length).fill(null);
                        loading.value = false;
                    });

                const currentQuestion = computed(() => questions.value[currentIndex.value]);
                const isLastQuestion = computed(() => currentIndex.value === questions.value.length - 1);
                const progressPercent = computed(() => {
                    if (!questions.value.length) return 0;
                    return Math.round((currentIndex.value / questions.value.length) * 100);
                });

                const scores = computed(() => {
                    const counts = { D: 0, I: 0, S: 0, C: 0 };
                    answers.value.forEach((ansIdx, qIdx) => {
                        if (ansIdx !== null && questions.value[qIdx] && questions.value[qIdx].options[ansIdx]) {
                            counts[questions.value[qIdx].options[ansIdx].type]++;
                        }
                    });
                    return counts;
                });

                const scoreList = computed(() => {
                    const total = questions.value.length || 1;
                    const list = [
                        { type: 'D', name: '支配型', count: scores.value.D, percent: (scores.value.D / total) * 100 },
                        { type: 'I', name: '影响型', count: scores.value.I, percent: (scores.value.I / total) * 100 },
                        { type: 'S', name: '稳健型', count: scores.value.S, percent: (scores.value.S / total) * 100 },
                        { type: 'C', name: '谨慎型', count: scores.value.C, percent: (scores.value.C / total) * 100 }
                    ];
                    return list.sort((a, b) => b.count - a.count);
                });

                const dominantTypes = computed(() => {
                    const max = Math.max(...Object.values(scores.value));
                    if (max === 0) return [];
                    return ['D', 'I', 'S', 'C'].filter(t => scores.value[t] === max).sort();
                });

                const dominantTypesLabel = computed(() => {
                    return dominantTypes.value.map(t => `${t}型`).join(' / ');
                });

                const coreTraits = computed(() => {
                    return dominantTypes.value.map(t => typeInfo.value[t]?.name || '').filter(Boolean).join(' + ');
                });

                const developmentTips = computed(() => {
                    const tips = [];
                    dominantTypes.value.forEach(t => {
                        if (typeInfo.value[t]) {
                            tips.push(...typeInfo.value[t].tips);
                        }
                    });
                    return tips;
                });

                const startTest = () => {
                    page.value = 'question';
                    currentIndex.value = 0;
                    answers.value = new Array(questions.value.length).fill(null);
                };

                const selectOption = (idx) => {
                    answers.value[currentIndex.value] = idx;
                    if (!isLastQuestion.value) {
                        setTimeout(() => {
                            currentIndex.value++;
                        }, 250);
                    }
                };

                const nextQuestion = () => {
                    if (isLastQuestion.value) {
                        page.value = 'result';
                    } else {
                        currentIndex.value++;
                    }
                };

                const prevQuestion = () => {
                    if (currentIndex.value > 0) {
                        currentIndex.value--;
                    }
                };

                const restartTest = () => {
                    page.value = 'start';
                    currentIndex.value = 0;
                    answers.value = new Array(questions.value.length).fill(null);
                };

                const shareResult = () => {
                    const text = `我的 DISC 行为模型测试结果是：${dominantTypesLabel.value}。快来看看你的行为风格吧！`;
                    if (navigator.share) {
                        navigator.share({
                            title: 'DISC 行为模型测试结果',
                            text: text,
                            url: window.location.href
                        }).catch(() => { });
                    } else if (navigator.clipboard) {
                        navigator.clipboard.writeText(text + ' ' + window.location.href).then(() => {
                            alert('结果已复制到剪贴板');
                        });
                    } else {
                        alert(text);
                    }
                };

                return {
                    page,
                    currentIndex,
                    answers,
                    questions,
                    currentQuestion,
                    isLastQuestion,
                    progressPercent,
                    scoreList,
                    scores,
                    dominantTypes,
                    dominantTypesLabel,
                    coreTraits,
                    developmentTips,
                    typeInfo,
                    loading,
                    startTest,
                    selectOption,
                    nextQuestion,
                    prevQuestion,
                    restartTest,
                    shareResult
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
